name: windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only PRs cancel superseded runs — every main commit keeps its installer.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        # Pinned: clippy runs with -D warnings, and new stable releases add
        # lints that would break main with zero repo changes. Bump deliberately.
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Placeholder frontendDist for Rust checks
        # tauri::generate_context! requires ../dist to exist at macro-expansion
        # time; the real dist is produced later by tauri build's beforeBuildCommand.
        shell: bash
        run: mkdir -p dist && printf '<!doctype html><title>Juno</title>' > dist/index.html

      - name: Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust lints
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri app (NSIS + updater artifacts)
        run: npm run tauri build
        env:
          CI: "true"
          # Signs updater packages when the secret is present (required for
          # in-app auto-update). Builds still succeed unsigned for PRs.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: juno-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*
          if-no-files-found: error

      # ---- Tag releases: attach installer + latest.json for auto-update ----
      # Tauri v2 (createUpdaterArtifacts: true) reuses the NSIS setup.exe as the
      # update bundle and writes setup.exe.sig next to it. The old v1Compatible
      # path used *.nsis.zip — that file is NOT produced in v2 mode, so looking
      # only for the zip left latest.json missing and every in-app update check
      # failed with "could not fetch a valid release json from the remote".
      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          NSIS="src-tauri/target/release/bundle/nsis"
          ls -la "$NSIS"
          VERSION="${GITHUB_REF_NAME#v}"
          INSTALLER=$(ls "$NSIS"/*-setup.exe 2>/dev/null | head -1 || true)
          if [[ -z "${INSTALLER}" ]]; then
            echo "::error::No NSIS setup.exe found under ${NSIS}"
            exit 1
          fi

          # Prefer Tauri v2 artifact (setup.exe + setup.exe.sig). Fall back to
          # v1Compatible nsis.zip + nsis.zip.sig if present.
          UPDATER_BUNDLE=""
          SIG=""
          if [[ -f "${INSTALLER}.sig" ]]; then
            UPDATER_BUNDLE="${INSTALLER}"
            SIG="${INSTALLER}.sig"
          else
            UPDATER_ZIP=$(ls "$NSIS"/*.nsis.zip 2>/dev/null | head -1 || true)
            if [[ -n "${UPDATER_ZIP}" && -f "${UPDATER_ZIP}.sig" ]]; then
              UPDATER_BUNDLE="${UPDATER_ZIP}"
              SIG="${UPDATER_ZIP}.sig"
            fi
          fi

          echo "installer=${INSTALLER}" >> "$GITHUB_OUTPUT"
          echo "updater_bundle=${UPDATER_BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "sig=${SIG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ -z "${UPDATER_BUNDLE}" || -z "${SIG}" ]]; then
            echo "::error::Updater signature missing. Ensure TAURI_SIGNING_PRIVATE_KEY is set and createUpdaterArtifacts is true. Contents of ${NSIS}:"
            ls -la "$NSIS"
            exit 1
          fi

          python - "$VERSION" "$UPDATER_BUNDLE" "$SIG" "${{ github.repository }}" "${GITHUB_REF_NAME}" <<'PY'
          import json, pathlib, sys, datetime
          version, bundle_path, sig_path, repo, tag = sys.argv[1:6]
          signature = pathlib.Path(sig_path).read_text(encoding="utf-8").replace("\r", "").strip()
          if not signature:
              raise SystemExit(f"empty signature file: {sig_path}")
          name = pathlib.Path(bundle_path).name
          url = f"https://github.com/{repo}/releases/download/{tag}/{name}"
          payload = {
              "version": version,
              "notes": f"Juno for Windows {version}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "windows-x86_64": {
                      "signature": signature,
                      "url": url,
                  }
              },
          }
          out = pathlib.Path("latest.json")
          out.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          # Sanity-check the shape the Tauri updater requires.
          data = json.loads(out.read_text(encoding="utf-8"))
          plat = data["platforms"]["windows-x86_64"]
          assert data["version"], "version required"
          assert plat["url"].startswith("https://"), "url must be https"
          assert len(plat["signature"]) > 32, "signature too short"
          print(out.read_text(encoding="utf-8"))
          PY
          echo "has_updater=true" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Juno for Windows ${{ github.ref_name }}
          generate_release_notes: true
          # latest.json is required for in-app auto-update — fail if missing.
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/nsis/*
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
